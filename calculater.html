<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Calculator</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 700px;
      background: steelblue;
      font-family: Arial, sans-serif;
    }

    .calculator {
      width: 270px;
      background: white;
      border-radius: 15px;
      padding: 15px;
      border: 1px solid black;
    }

    input {
      width: 100%;
      height: 70px;
      border: none;
      background: linear-gradient(to bottom, #141e30, #243b55);
      color: white;
      font-size: 28px;
      text-align: right;
      border-radius: 10px;
      padding-right: 10px;
      margin-bottom: 15px;
    }

    button {
      width: 55px;
      height: 55px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    .num {
      background: linear-gradient(to bottom, #3b82f6, #2563eb);
    }

    .op {
      background: linear-gradient(to bottom, #f59e0b, #f97316);
    }

    #CLEAR {
      background: linear-gradient(to bottom, #ef4444, #dc2626);
      width: 120px;
    }

    #EQUAL {
      background: linear-gradient(to bottom, #22c55e, #16a34a);
      width: 120px;
    }
  </style>
</head>

<body>

  <div class="calculator">
    <input type="text" id="display" value="0">

    <button onclick="clearinput()" id="CLEAR">C</button>
    <button onclick="back()" class="op">⌫</button>

    <button onclick="Operator('/')" class="op">÷</button>
    <button onclick="Operator('*')" class="op">×</button>
    <button onclick="Operator('+')" class="op">+</button>
    <button onclick="Operator('-')" class="op">−</button>

    <button onclick="append('.')" class="op">.</button>

    <button onclick="append('7')" class="num">7</button>
    <button onclick="append('8')" class="num">8</button>
    <button onclick="append('9')" class="num">9</button>

    <button onclick="append('4')" class="num">4</button>
    <button onclick="append('5')" class="num">5</button>
    <button onclick="append('6')" class="num">6</button>

    <button onclick="append('1')" class="num">1</button>
    <button onclick="append('2')" class="num">2</button>
    <button onclick="append('3')" class="num">3</button>

    <button onclick="append('0')" class="num">0</button>
    <button onclick="salution()" id="EQUAL">=</button>
  </div>

<script>
   let display = document.getElementById("display");

function append(value) {
  if (display.value === "0") {
    display.value = value;
  } else {
    display.value += value;
  }
}

function Operator(operator) {
  const lastChar = display.value.slice(-1);
  
  if ("+-*/".includes(lastChar)) {
    display.value = display.value.slice(0, -1) + operator;
  } else if (display.value !== "") {
    display.value += operator;
  }
}

function clearinput() {
  display.value = "";
}

function back() {
  display.value = display.value.slice(0, -1);
}

function salution() {
  try {
    display.value = eval(display.value);
  } catch (error) {
    display.value = "Error";
  }
}

</script>

</body>
</html>
